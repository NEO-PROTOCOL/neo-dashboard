<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NΞØ TERMINAL</title>
    <style>
        :root {
            --bg: #0c0c0c;
            --term-green: #0f0;
            --term-dim: #004400;
            --term-text: #ccc;
            --term-highlight: #fff;
        }

        body {
            background-color: var(--bg);
            color: var(--term-text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            font-size: 18px;
            line-height: 1.5;
        }

        .terminal {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: var(--term-green);
            border-bottom: 2px solid var(--term-dim);
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .section {
            margin-bottom: 30px;
            border-left: 1px solid #333;
            padding-left: 15px;
        }

        .section-title {
            color: #888;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .data-row {
            display: flex;
            margin-bottom: 5px;
        }

        .label {
            width: 150px;
            color: #666;
        }

        .value {
            color: var(--term-highlight);
            flex: 1;
        }

        .value.success {
            color: var(--term-green);
        }

        .value.dim {
            color: #555;
        }

        .value.code {
            font-family: monospace;
            color: #ffeb3b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: #666;
            border-bottom: 1px solid #333;
            padding: 5px;
            font-weight: normal;
        }

        td {
            padding: 8px 5px;
            border-bottom: 1px dashed #222;
        }

        .btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 5px 10px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            margin-right: 10px;
        }

        .btn:hover {
            border-color: var(--term-green);
            color: var(--term-green);
        }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .refresh-bar {
            margin-bottom: 20px;
            text-align: right;
        }

        #log-output {
            color: #555;
            font-size: 11px;
            margin-top: 20px;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
    </style>
</head>

<body>

    <div class="terminal">
        <div class="refresh-bar">
            <span id="clock">--:--:--</span> |
            <button class="btn" onclick="fetchData()">REFRESH_DATA</button>
            <button class="btn" onclick="window.location.href='/'">EXIT_TO_MAIN</button>
        </div>

        <h1>NΞØ_PROTOCOL v1.0 <span class="blink">_</span></h1>

        <!-- System Status -->
        <div class="section">
            <div class="section-title">>> SYSTEM_STATUS</div>
            <div class="data-row">
                <span class="label">CONNECTION:</span>
                <span class="value success" id="status-conn">ONLINE</span>
            </div>
            <div class="data-row">
                <span class="label">REGISTRY_CID:</span>
                <span class="value code" id="status-cid">LOADING...</span>
            </div>
            <div class="data-row">
                <span class="label">LAST_UPDATE:</span>
                <span class="value" id="status-update">...</span>
            </div>
        </div>

        <!-- Active Skills -->
        <div class="section">
            <div class="section-title">>> INSTALLED_MODULES (SKILLS)</div>
            <table id="skills-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>VERSION</th>
                        <th>CID</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" style="text-align:center; padding: 20px; color:#444">SCANNING_LOCAL_DRIVE...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Logs -->
        <div id="log-output">
            [SYSTEM] Interface initialized ready.
        </div>

    </div>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Logger
        function log(msg) {
            const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const div = document.createElement('div');
            div.innerText = line;
            const container = document.getElementById('log-output');
            container.prepend(div);
            if (container.children.length > 5) container.lastChild.remove();
        }

        // Loader
        async function fetchData() {
            log('Fetching registry data...');
            try {
                const res = await fetch('/api/neo/registry');
                const data = await res.json();

                if (data.success) {
                    render(data);
                    log('Data update complete.');
                } else {
                    log('ERROR: ' + data.error);
                }
            } catch (e) {
                log('CONNECTION_ERROR: ' + e.message);
            }
        }

        function render(data) {
            // Status
            document.getElementById('status-cid').innerText = data.indexCID || "NOT_PUBLISHED";
            document.getElementById('status-update').innerText = data.updatedAt ? new Date(data.updatedAt).toLocaleString() : "NEVER";

            // Table
            const tbody = document.querySelector('#skills-table tbody');
            tbody.innerHTML = '';

            if (data.skills && data.skills.length > 0) {
                data.skills.forEach(skill => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                    <td style="color: #fff; font-weight:bold">${skill.id}</td>
                    <td>v${skill.latest}</td>
                    <td style="font-family:monospace; color: #555; font-size: 11px;">${getShortCID(skill.versionList[0] || '???')}</td> <!-- Mock logic for now -->
                    <td style="color: #0f0">ACTIVE</td>
                `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: #666">NO_MODULES_FOUND</td></tr>';
            }
        }

        function getShortCID(obj) {
            // The API returns versionList as keys (versions), we need to extract CID
            // This part depends on how exactly we implemented getIndex in backend.
            // Let's assume Backend sends clean enough data or we just show "LINKED".
            return "IPFS_LINKED";
        }

        // Init
        fetchData();

    </script>

</body>

</html>
