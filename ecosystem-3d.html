<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEØ Ecosystem Graph</title>
    <style>
      body {
        margin: 0;
        background: #0a0a0a;
        color: #fff;
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }
      #graph-container {
        width: 100vw;
        height: 100vh;
      }
      .overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: none;
        z-index: 10;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        color: #00ffcc;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      }
      .legend {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #333;
        font-size: 12px;
        -webkit-backdrop-filter: blur(5px);
        backdrop-filter: blur(5px);
        min-width: 170px;
      }
      .legend-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        gap: 10px;
        color: #8fa2bb;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .4px;
      }
      .legend-header:hover {
        color: #d4deea;
      }
      .legend-body {
        margin-top: 8px;
      }
      .legend.collapsed .legend-body {
        display: none;
      }
      .legend-arrow {
        font-size: 9px;
        color: #748099;
        transition: transform 0.18s ease;
        display: inline-block;
      }
      .legend.collapsed .legend-arrow {
        transform: rotate(-90deg);
      }
      .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
        color: #c6d2e0;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 10px;
        flex-shrink: 0;
      }
      .control-panel {
        margin-top: 10px;
        max-width: 430px;
        background: rgba(0, 0, 0, 0.62);
        border: 1px solid #2a3240;
        border-radius: 8px;
        padding: 10px 12px;
        pointer-events: auto;
      }
      .control-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        gap: 8px;
      }
      .control-panel-header:hover span {
        color: #d4deea !important;
      }
      .control-panel-body {
        margin-top: 8px;
      }
      .control-panel.collapsed .control-panel-body {
        display: none;
      }
      .control-toggle-arrow {
        font-size: 9px;
        color: #748099;
        transition: transform 0.18s ease;
        display: inline-block;
      }
      .control-panel.collapsed .control-toggle-arrow {
        transform: rotate(-90deg);
      }
      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }
      .control-label {
        display: block;
        color: #8fa2bb;
        font-size: 10px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .control-select,
      .control-input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #2a3240;
        border-radius: 6px;
        background: #0b121c;
        color: #d4deea;
        font-size: 11px;
        padding: 6px 8px;
      }
      .control-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }
      .control-btn {
        border: 1px solid #2a3240;
        border-radius: 6px;
        background: #111b28;
        color: #c6d2e0;
        font-size: 11px;
        padding: 6px 10px;
        cursor: pointer;
      }
      .control-btn:hover {
        border-color: #3d4f66;
      }
      .control-meta {
        color: #7f8ea3;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <h1>NEØ Protocol Ecosystem</h1>
      <p style="color: #888">Interactive 3D Graph Visualization</p>
    </div>

    <div id="graph-container"></div>

    <div class="legend collapsed" id="legend-panel">
      <div class="legend-header" onclick="document.getElementById('legend-panel').classList.toggle('collapsed')">
        <span>● Legend</span>
        <span class="legend-arrow">▼</span>
      </div>
      <div class="legend-body" id="legend-body">
        <div class="legend-item"><div class="dot" style="background:#ff4444"></div>NEO Protocol (Core)</div>
        <div class="legend-item"><div class="dot" style="background:#00ccff"></div>Neo Smart Factory</div>
        <div class="legend-item"><div class="dot" style="background:#00ffcc"></div>FlowPay</div>
        <div class="legend-item"><div class="dot" style="background:#4488ff"></div>Fluxx Dao</div>
        <div class="legend-item"><div class="dot" style="background:#ffcc00"></div>WOD Game</div>
        <div class="legend-item"><div class="dot" style="background:#ff00ff"></div>NEO-FlowOFF</div>
        <div class="legend-item"><div class="dot" style="background:#9aa4b2"></div>DApps &amp; Tools</div>
      </div>
    </div>

    <script>
      const API_PASS_KEY = "neo_gateway_password";
      const LIVE_REFRESH_MS = 8000;
      const CHANGE_FLASH_MS = 20000;
      const MAX_EVENT_LINES = 8;
      const PAYMENT_ROUTES_TTL_MS = 30000;

      const colorMap = {
        "NEO Protocol": "#ff4444",
        "Neo Smart Factory": "#00ccff",
        FlowPay: "#00ffcc",
        "Fluxx Dao": "#4488ff",
        "NEO-FlowOFF": "#ff00ff",
        "WOD Game": "#ffcc00",
        "DApps & Tools": "#9aa4b2",
      };

      const statusColors = {
        online: "#39d98a",
        degraded: "#ffb74d",
        offline: "#ff4d67",
        unknown: "#7b8797",
      };

      const graphContainer = document.getElementById("graph-container");
      const overlay = document.querySelector(".overlay");
      const legend = document.querySelector(".legend");

      overlay.insertAdjacentHTML(
        "beforeend",
        `
          <div id="live-hud" style="margin-top:10px;max-width:430px;background:rgba(0,0,0,.62);border:1px solid #2a3240;border-radius:8px;padding:10px 12px;pointer-events:auto;">
            <div id="live-summary" style="font-size:12px;color:#b4c0d1;">Loading live telemetry...</div>
            <div id="live-meta" style="font-size:11px;color:#748099;margin-top:5px;"></div>
            <div id="live-alerts" style="font-size:11px;color:#ffb74d;margin-top:8px;line-height:1.35;"></div>
          </div>
          <div class="control-panel collapsed" id="filter-panel">
            <div class="control-panel-header" onclick="document.getElementById('filter-panel').classList.toggle('collapsed')">
              <span style="font-size:11px;color:#b4c0d1;letter-spacing:.3px;">⚙ Graph Filters</span>
              <span class="control-toggle-arrow">▼</span>
            </div>
            <div class="control-panel-body">
            <div class="control-grid">
              <div>
                <label class="control-label" for="filter-view">View</label>
                <select id="filter-view" class="control-select">
                  <option value="all">All Nodes</option>
                  <option value="payment">Payment Nodes</option>
                  <option value="issues">Offline / Degraded</option>
                  <option value="unlinked">Nexus Unlinked</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-group">Group</label>
                <select id="filter-group" class="control-select">
                  <option value="all">All Groups</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-org">Org</label>
                <select id="filter-org" class="control-select">
                  <option value="all">All Orgs</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-role">Role</label>
                <select id="filter-role" class="control-select">
                  <option value="all">All Roles</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-status">Status</label>
                <select id="filter-status" class="control-select">
                  <option value="all">All Status</option>
                  <option value="online">Online</option>
                  <option value="degraded">Degraded</option>
                  <option value="offline">Offline</option>
                  <option value="unknown">Unknown</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-nexus">Nexus</label>
                <select id="filter-nexus" class="control-select">
                  <option value="all">Linked + Unlinked</option>
                  <option value="linked">Only Linked</option>
                  <option value="unlinked">Only Unlinked</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-route-env">Route Env</label>
                <select id="filter-route-env" class="control-select">
                  <option value="all">All Route Envs</option>
                </select>
              </div>
              <div>
                <label class="control-label" for="filter-route-kind">Route Kind</label>
                <select id="filter-route-kind" class="control-select">
                  <option value="all">All Route Kinds</option>
                </select>
              </div>
              <div style="grid-column: 1 / -1;">
                <label class="control-label" for="filter-search">Search</label>
                <input id="filter-search" class="control-input" type="text" placeholder="id, name, role, org, route" />
              </div>
            </div>
            <div class="control-actions">
              <button id="filter-reset" class="control-btn" type="button">Reset Filters</button>
              <span id="filter-meta" class="control-meta">Visible: 0/0</span>
            </div>
            </div>
          </div>
        `,
      );

      document.getElementById("legend-body").insertAdjacentHTML(
        "beforeend",
        `
          <hr style="border:none;border-top:1px solid #2a3240;margin:8px 0" />
          <div class="legend-item"><div class="dot" style="background:${statusColors.online}"></div>Online</div>
          <div class="legend-item"><div class="dot" style="background:${statusColors.degraded}"></div>Degraded</div>
          <div class="legend-item"><div class="dot" style="background:${statusColors.offline}"></div>Offline</div>
          <div class="legend-item"><div class="dot" style="background:${statusColors.unknown}"></div>Unknown</div>
        `,
      );

      const liveSummaryEl = document.getElementById("live-summary");
      const liveMetaEl = document.getElementById("live-meta");
      const liveAlertsEl = document.getElementById("live-alerts");
      const filterViewEl = document.getElementById("filter-view");
      const filterGroupEl = document.getElementById("filter-group");
      const filterOrgEl = document.getElementById("filter-org");
      const filterRoleEl = document.getElementById("filter-role");
      const filterStatusEl = document.getElementById("filter-status");
      const filterNexusEl = document.getElementById("filter-nexus");
      const filterRouteEnvEl = document.getElementById("filter-route-env");
      const filterRouteKindEl = document.getElementById("filter-route-kind");
      const filterSearchEl = document.getElementById("filter-search");
      const filterResetEl = document.getElementById("filter-reset");
      const filterMetaEl = document.getElementById("filter-meta");

      let graphMode = "none";
      let graphInstance = null;
      let fetchInFlight = false;
      let refreshTimer = null;
      const lastStatusById = new Map();
      const changedUntilById = new Map();
      const transitionLog = [];
      const latestNodeMeta = new Map();
      let lastTopologySignature = null;
      let latestPayloadMeta = null;
      let latestFullGraphData = null;
      const paymentRoutesCache = {
        checkedAt: 0,
        payload: null,
        inFlight: null,
      };
      const filterState = {
        view: "all",
        group: "all",
        org: "all",
        role: "all",
        status: "all",
        nexus: "all",
        routeEnv: "all",
        routeKind: "all",
        search: "",
      };

      function getGatewayPassword() {
        try {
          const fromStorage = localStorage.getItem(API_PASS_KEY) || "";
          if (fromStorage) return fromStorage;
        } catch (_e) {}
        const params = new URLSearchParams(window.location.search);
        return params.get("password") || "";
      }

      function pushTransition(line) {
        transitionLog.unshift(line);
        transitionLog.splice(MAX_EVENT_LINES);
      }

      function topologySignature(data) {
        const nodes = Array.isArray(data?.nodes) ? data.nodes : [];
        const links = Array.isArray(data?.links) ? data.links : [];
        const nodeIds = nodes
          .map((n) => String(n?.id || ""))
          .filter(Boolean)
          .sort()
          .join("|");
        const linkIds = links
          .map(
            (l) =>
              `${String(l?.source || "")}->${String(l?.target || "")}:${String(l?.label || "")}`,
          )
          .sort()
          .join("|");
        return `${nodeIds}::${linkIds}`;
      }

      function authHeaders() {
        const password = getGatewayPassword();
        return password ? { "x-gateway-password": password } : {};
      }

      async function fetchPaymentRoutesCatalog() {
        const now = Date.now();
        if (
          paymentRoutesCache.payload &&
          now - paymentRoutesCache.checkedAt < PAYMENT_ROUTES_TTL_MS
        ) {
          return paymentRoutesCache.payload;
        }
        if (paymentRoutesCache.inFlight) return paymentRoutesCache.inFlight;

        paymentRoutesCache.inFlight = (async () => {
          try {
            const res = await fetch("/api/neo/ecosystem/payment-routes", {
              headers: authHeaders(),
            });
            if (!res.ok) return null;
            const payload = await res.json();
            if (!payload?.success || !Array.isArray(payload?.nodes)) return null;
            paymentRoutesCache.payload = payload;
            paymentRoutesCache.checkedAt = Date.now();
            return payload;
          } catch (_e) {
            return null;
          } finally {
            paymentRoutesCache.inFlight = null;
          }
        })();

        return paymentRoutesCache.inFlight;
      }

      function paymentRouteMap(paymentPayload) {
        const map = new Map();
        if (!Array.isArray(paymentPayload?.nodes)) return map;
        paymentPayload.nodes.forEach((node) => {
          const id = String(node?.nodeId || "").trim();
          if (!id) return;
          map.set(
            id,
            Array.isArray(node?.routes) ? node.routes : [],
          );
        });
        return map;
      }

      function enrichWithPaymentData(graphData, paymentPayload) {
        const nodes = Array.isArray(graphData?.nodes) ? graphData.nodes : [];
        const links = Array.isArray(graphData?.links) ? graphData.links : [];
        const routesByNode = paymentRouteMap(paymentPayload);
        const enrichedNodes = nodes.map((node) => {
          const id = String(node?.id || "");
          const routes = routesByNode.get(id) || [];
          return {
            ...node,
            _paymentRoutes: routes,
            _isPaymentNode: routes.length > 0,
          };
        });
        return { nodes: enrichedNodes, links };
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function updateSelectOptions(selectEl, values, allLabel, stateKey) {
        const current = selectEl.value || "all";
        const normalizedValues = [...new Set((values || []).map((v) => String(v || "").trim()).filter(Boolean))].sort();
        const options = [`<option value="all">${escapeHtml(allLabel)}</option>`]
          .concat(normalizedValues.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`))
          .join("");
        selectEl.innerHTML = options;
        if (normalizedValues.includes(current)) selectEl.value = current;
        else selectEl.value = "all";
        filterState[stateKey] = selectEl.value;
      }

      function updateDynamicFilterOptions(nodes) {
        const safeNodes = Array.isArray(nodes) ? nodes : [];
        updateSelectOptions(
          filterGroupEl,
          safeNodes.map((n) => n?.group),
          "All Groups",
          "group",
        );
        updateSelectOptions(
          filterOrgEl,
          safeNodes.map((n) => n?.org),
          "All Orgs",
          "org",
        );
        updateSelectOptions(
          filterRoleEl,
          safeNodes.map((n) => n?.role),
          "All Roles",
          "role",
        );
        updateSelectOptions(
          filterRouteEnvEl,
          safeNodes.flatMap((n) =>
            (Array.isArray(n?._paymentRoutes) ? n._paymentRoutes : []).map((r) =>
              String(r?.env || "").trim(),
            ),
          ),
          "All Route Envs",
          "routeEnv",
        );
        updateSelectOptions(
          filterRouteKindEl,
          safeNodes.flatMap((n) =>
            (Array.isArray(n?._paymentRoutes) ? n._paymentRoutes : []).map((r) =>
              String(r?.kind || "").trim(),
            ),
          ),
          "All Route Kinds",
          "routeKind",
        );
      }

      function nodeHasRouteByField(node, field, expected) {
        if (expected === "all") return true;
        const routes = Array.isArray(node?._paymentRoutes) ? node._paymentRoutes : [];
        return routes.some((route) => String(route?.[field] || "") === expected);
      }

      function nodeMatchesSearch(node, search) {
        if (!search) return true;
        const routeText = (Array.isArray(node?._paymentRoutes) ? node._paymentRoutes : [])
          .map((route) => `${route?.kind || ""} ${route?.env || ""} ${route?.method || ""} ${route?.url || ""} ${route?.path || ""}`)
          .join(" ");
        const hay = `${node?.id || ""} ${node?.name || ""} ${node?.group || ""} ${node?.org || ""} ${node?.role || ""} ${node?.status || ""} ${node?.nexusConnection || ""} ${routeText}`.toLowerCase();
        return hay.includes(search);
      }

      function linkEndId(end) {
        if (!end) return "";
        if (typeof end === "object") return String(end.id || "");
        return String(end);
      }

      function applyFiltersToGraphData(fullData) {
        const nodes = Array.isArray(fullData?.nodes) ? fullData.nodes : [];
        const links = Array.isArray(fullData?.links) ? fullData.links : [];
        const search = filterState.search.trim().toLowerCase();

        let filteredNodes = nodes.filter((node) => {
          if (filterState.view === "payment" && !node?._isPaymentNode) return false;
          if (
            filterState.view === "issues" &&
            !["offline", "degraded"].includes(String(node?.status || "").toLowerCase())
          ) {
            return false;
          }
          if (filterState.view === "unlinked" && node?.nexusConnection !== "unlinked") return false;
          if (filterState.group !== "all" && String(node?.group || "") !== filterState.group) return false;
          if (filterState.org !== "all" && String(node?.org || "") !== filterState.org) return false;
          if (filterState.role !== "all" && String(node?.role || "") !== filterState.role) return false;
          if (filterState.status !== "all" && String(node?.status || "") !== filterState.status) return false;
          if (filterState.nexus !== "all" && String(node?.nexusConnection || "") !== filterState.nexus) return false;
          if (!nodeHasRouteByField(node, "env", filterState.routeEnv)) return false;
          if (!nodeHasRouteByField(node, "kind", filterState.routeKind)) return false;
          if (!nodeMatchesSearch(node, search)) return false;
          return true;
        });

        // Keep core context visible in payment and issue-focused views.
        const strictSubFilterActive =
          filterState.group !== "all" ||
          filterState.org !== "all" ||
          filterState.role !== "all" ||
          filterState.status !== "all" ||
          filterState.nexus !== "all" ||
          filterState.routeEnv !== "all" ||
          filterState.routeKind !== "all" ||
          search.length > 0;
        if (["payment", "issues", "unlinked"].includes(filterState.view) && !strictSubFilterActive) {
          const keepIds = new Set(["neo-nexus", "neobot-orchestrator"]);
          nodes.forEach((node) => {
            if (keepIds.has(String(node?.id || "")) && !filteredNodes.find((n) => n.id === node.id)) {
              filteredNodes.push(node);
            }
          });
        }

        const filteredIdSet = new Set(filteredNodes.map((n) => String(n?.id || "")).filter(Boolean));
        const filteredLinks = links.filter((link) => {
          const src = linkEndId(link?.source);
          const tgt = linkEndId(link?.target);
          return filteredIdSet.has(src) && filteredIdSet.has(tgt);
        });

        filterMetaEl.textContent = `Visible: ${filteredNodes.length}/${nodes.length}`;
        return { nodes: filteredNodes, links: filteredLinks };
      }

      function preserveLayoutState(prevData, nextData) {
        const prevNodes = Array.isArray(prevData?.nodes) ? prevData.nodes : [];
        const nextNodes = Array.isArray(nextData?.nodes) ? nextData.nodes : [];
        if (!prevNodes.length || !nextNodes.length) return nextData;

        const prevById = new Map();
        prevNodes.forEach((n) => {
          const id = String(n?.id || "");
          if (!id) return;
          prevById.set(id, n);
        });

        const nodes = nextNodes.map((n) => {
          const id = String(n?.id || "");
          const prev = prevById.get(id);
          if (!prev) return n;
          return {
            ...n,
            x: prev.x,
            y: prev.y,
            z: prev.z,
            vx: prev.vx,
            vy: prev.vy,
            vz: prev.vz,
            fx: prev.fx,
            fy: prev.fy,
            fz: prev.fz,
          };
        });

        return {
          ...nextData,
          nodes,
        };
      }

      function normalizeGroup(n) {
        const org = String(n?.org || "").toLowerCase();
        const mix =
          `${n?.id || ""} ${n?.name || ""} ${n?.role || ""}`.toLowerCase();

        if (org.includes("flowpay") || mix.includes("flowpay"))
          return "FlowPay";
        if (org.includes("fluxx") || mix.includes("fluxx")) return "Fluxx Dao";
        if (org.includes("smart factory") || mix.includes("smart "))
          return "Neo Smart Factory";
        if (mix.includes("wod")) return "WOD Game";
        if (
          org.includes("neo-flowoff") ||
          mix.includes("flowoff") ||
          mix.includes("pro-ia") ||
          mix.includes("node neø run") ||
          mix.includes("node neo run")
        ) {
          return "NEO-FlowOFF";
        }
        if (org.includes("neo protocol") || mix.includes("neo"))
          return "NEO Protocol";
        return "DApps & Tools";
      }

      function computeNodeVal(n, group) {
        const role = String(n?.role || "").toLowerCase();
        const id = String(n?.id || "").toLowerCase();
        if (
          role.includes("orchestrator") ||
          role.includes("event hub") ||
          role.includes("sovereign")
        )
          return 12;
        if (id.includes("nexus") || id.includes("architect")) return 11;
        if (role.includes("protocol") || role.includes("contract")) return 9;
        if (group === "FlowPay" || group === "Neo Smart Factory") return 8;
        return 6;
      }

      function nodeStatus(rawNode) {
        return String(
          rawNode?._live?.status || rawNode?.status || "unknown",
        ).toLowerCase();
      }

      function nodeNexusConnection(rawNode) {
        if (rawNode?._live?.nexusConnection)
          return rawNode._live.nexusConnection;
        if (
          rawNode?.webhookUrl ||
          rawNode?.webhookRoutes ||
          rawNode?.nexusEvents
        )
          return "linked";
        return "unlinked";
      }

      function nodeColor(node) {
        if (node.status === "online") return colorMap[node.group] || "#9aa4b2";
        return statusColors[node.status] || statusColors.unknown;
      }

      function linkColor(link) {
        if (link.label === "missing-nexus") return "#ff4d67";
        const source = latestNodeMeta.get(linkEndId(link.source));
        const target = latestNodeMeta.get(linkEndId(link.target));
        if (source?.status === "offline" || target?.status === "offline")
          return "#ff7d8e";
        if (source?.status === "degraded" || target?.status === "degraded")
          return "#ffb74d";
        return "#2f3948";
      }

      function normalizeGraphData(data) {
        return {
          nodes: (data?.nodes || []).map((n) => ({
            ...n,
            status: n.status || "unknown",
            nexusConnection: n.nexusConnection || "unknown",
          })),
          links: Array.isArray(data?.links) ? data.links : [],
        };
      }

      function buildGraphFromEcosystem(rawNodes) {
        const valid = Array.isArray(rawNodes) ? rawNodes : [];
        const now = Date.now();
        const nodes = [];
        const links = [];
        latestNodeMeta.clear();
        const seen = new Set();
        const byGroup = new Map();
        const linkKey = new Set();

        valid.forEach((raw, idx) => {
          const id = String(raw?.id || raw?.name || `node-${idx}`).trim();
          if (!id || seen.has(id)) return;
          seen.add(id);

          const status = nodeStatus(raw);
          const nexusConnection = nodeNexusConnection(raw);
          const prevStatus = lastStatusById.get(id);
          if (prevStatus && prevStatus !== status) {
            changedUntilById.set(id, now + CHANGE_FLASH_MS);
            pushTransition(
              `[${new Date().toLocaleTimeString()}] ${raw?.name || id}: ${prevStatus} -> ${status}`,
            );
          }
          lastStatusById.set(id, status);

          const group = normalizeGroup(raw);
          const isFlashing = (changedUntilById.get(id) || 0) > now;
          const baseVal = computeNodeVal(raw, group);
          const statusPenalty =
            status === "offline" ? -2 : status === "degraded" ? -1 : 0;

          const node = {
            id,
            name: String(raw?.name || id),
            group,
            role: String(raw?.role || ""),
            org: String(raw?.org || ""),
            status,
            url:
              raw?._live?.url ||
              raw?.hosting?.activeUrl ||
              raw?.hosting?.productionUrl ||
              null,
            nexusConnection,
            val: Math.max(3, baseVal + statusPenalty + (isFlashing ? 3 : 0)),
          };
          nodes.push(node);
          latestNodeMeta.set(id, node);

          if (!byGroup.has(group)) byGroup.set(group, []);
          byGroup.get(group).push(node);
        });

        for (const [id, until] of changedUntilById.entries()) {
          if (until < now) changedUntilById.delete(id);
        }

        for (const [, groupNodes] of byGroup.entries()) {
          if (groupNodes.length <= 1) continue;
          const hub = groupNodes.reduce(
            (best, cur) => (cur.val > best.val ? cur : best),
            groupNodes[0],
          );
          groupNodes.forEach((n) => {
            if (n.id === hub.id) return;
            const key = `${n.id}->${hub.id}`;
            if (!linkKey.has(key)) {
              linkKey.add(key);
              links.push({ source: n.id, target: hub.id, label: "group" });
            }
          });
        }

        const nexusNode = nodes.find((n) =>
          n.id.toLowerCase().includes("nexus"),
        );
        const nexusId = nexusNode?.id || null;
        if (nexusId && seen.has(nexusId)) {
          nodes.forEach((n) => {
            if (n.id === nexusId) return;
            const key = `${n.id}->${nexusId}`;
            if (!linkKey.has(key)) {
              linkKey.add(key);
              links.push({
                source: n.id,
                target: nexusId,
                label:
                  n.nexusConnection === "linked" ? "nexus" : "missing-nexus",
              });
            }
          });
        }

        return { nodes, links };
      }

      async function fetchGraphPayload() {
        const headers = authHeaders();

        try {
          const liveRes = await fetch("/api/neo/ecosystem/live", { headers });
          if (liveRes.ok) {
            const payload = await liveRes.json();
            if (
              payload?.success &&
              Array.isArray(payload.nodes) &&
              payload.nodes.length > 0
            ) {
              return {
                mode: "live",
                source: payload.source || "live-api",
                checkedAt: payload.checkedAt,
                summary: payload.summary || null,
                graphData: buildGraphFromEcosystem(payload.nodes),
              };
            }
          } else if (liveRes.status === 401) {
            throw new Error("auth_required");
          }
        } catch (e) {
          console.warn("live ecosystem unavailable:", e?.message || e);
        }

        try {
          const res = await fetch("/api/neo/ecosystem", { headers });
          if (res.ok) {
            const payload = await res.json();
            const raw = Array.isArray(payload?.nodes)
              ? payload.nodes
              : Array.isArray(payload)
                ? payload
                : [];
            if (raw.length > 0) {
              return {
                mode: "snapshot",
                source: payload.source || "ecosystem-api",
                checkedAt: new Date().toISOString(),
                summary: null,
                graphData: buildGraphFromEcosystem(raw),
              };
            }
          }
        } catch (e) {
          console.warn("ecosystem API unavailable:", e?.message || e);
        }

        const staticRes = await fetch("ecosystem-graph.json");
        return {
          mode: "static",
          source: "static-json",
          checkedAt: new Date().toISOString(),
          summary: null,
          graphData: normalizeGraphData(await staticRes.json()),
        };
      }

      function renderHud(payload, fullGraphData, filteredGraphData) {
        const allData = fullGraphData || { nodes: [] };
        const visibleData = filteredGraphData || allData;
        const statusCount = allData.nodes.reduce(
          (acc, node) => {
            const st = node.status || "unknown";
            acc[st] = (acc[st] || 0) + 1;
            if (node.nexusConnection === "unlinked") acc.unlinked += 1;
            if (node._isPaymentNode) acc.payment += 1;
            return acc;
          },
          {
            online: 0,
            degraded: 0,
            offline: 0,
            unknown: 0,
            unlinked: 0,
            payment: 0,
          },
        );

        liveSummaryEl.textContent = `Visible: ${visibleData.nodes.length}/${allData.nodes.length} | Payment: ${statusCount.payment} | Online: ${statusCount.online} | Degraded: ${statusCount.degraded} | Offline: ${statusCount.offline} | Unlinked: ${statusCount.unlinked}`;

        liveMetaEl.textContent = `Source: ${payload.source} | Mode: ${payload.mode} | Checked: ${new Date(
          payload.checkedAt,
        ).toLocaleTimeString()}`;

        const alertLines = [];
        if (payload.mode !== "live") {
          alertLines.push(
            "[WARN] Live probe endpoint indisponivel. Exibindo snapshot.",
          );
        }
        // source: nexus-api is the expected production source — no warning needed
        if (statusCount.offline > 0) {
          alertLines.push(`[ALERT] ${statusCount.offline} node(s) offline.`);
        }
        if (statusCount.unlinked > 0) {
          alertLines.push(
            `[ALERT] ${statusCount.unlinked} node(s) sem link de integracao com Nexus.`,
          );
        }
        transitionLog.forEach((line) => alertLines.push(line));

        liveAlertsEl.innerHTML = alertLines.length
          ? alertLines.map((line) => `<div>${line}</div>`).join("")
          : '<div style="color:#39d98a;">No critical transitions in current window.</div>';
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const el = document.createElement("script");
          el.src = src;
          el.async = true;
          el.onload = () => resolve(src);
          el.onerror = () => reject(new Error(`failed: ${src}`));
          document.head.appendChild(el);
        });
      }

      function supportsWebGL() {
        try {
          const params = new URLSearchParams(window.location.search);
          if (params.get("force2d") === "1") return false;
          const c = document.createElement("canvas");
          return !!(
            window.WebGLRenderingContext &&
            (c.getContext("webgl2") ||
              c.getContext("webgl") ||
              c.getContext("experimental-webgl"))
          );
        } catch (_e) {
          return false;
        }
      }

      async function ensure3DLibrary() {
        const sources = [
          "https://unpkg.com/3d-force-graph",
          "https://cdn.jsdelivr.net/npm/3d-force-graph",
        ];
        for (const src of sources) {
          try {
            await loadScript(src);
            if (typeof ForceGraph3D === "function") return;
          } catch (e) {
            console.warn(e.message);
          }
        }
        throw new Error("3d-force-graph library unavailable");
      }

      async function ensure2DLibrary() {
        const sources = [
          "https://unpkg.com/force-graph",
          "https://cdn.jsdelivr.net/npm/force-graph",
        ];
        for (const src of sources) {
          try {
            await loadScript(src);
            if (typeof ForceGraph === "function") return;
          } catch (e) {
            console.warn(e.message);
          }
        }
        throw new Error("force-graph library unavailable");
      }

      function renderFallback(data, reason) {
        const nodes = (data?.nodes || []).slice(0, 60);
        graphContainer.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#7ee7ff;font-size:13px;letter-spacing:.3px;">
            Graph fallback mode (${reason}). Nodes loaded: ${nodes.length}
          </div>
        `;
      }

      function renderStaticSvg(data, reason = "static_svg") {
        const nodes = Array.isArray(data?.nodes) ? data.nodes : [];
        const links = Array.isArray(data?.links) ? data.links : [];
        if (!nodes.length) {
          renderFallback(data, reason);
          return;
        }

        const width = Math.max(graphContainer.clientWidth || 900, 600);
        const height = Math.max(graphContainer.clientHeight || 520, 420);
        const cx = width / 2;
        const cy = height / 2;
        const radius = Math.min(width, height) * 0.34;
        const idx = new Map();
        nodes.forEach((n, i) => idx.set(n.id ?? n.name ?? i, i));

        const positioned = nodes.map((n, i) => {
          const a = (i / nodes.length) * Math.PI * 2;
          return {
            ...n,
            x: cx + radius * Math.cos(a),
            y: cy + radius * Math.sin(a),
            color: nodeColor(n),
          };
        });

        const svgLinks = links
          .map((l) => {
            const sIdx = idx.get(l.source);
            const tIdx = idx.get(l.target);
            if (sIdx == null || tIdx == null) return "";
            const s = positioned[sIdx];
            const t = positioned[tIdx];
            return `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="${linkColor(l)}" stroke-width="${l.label === "missing-nexus" ? 1.8 : 1}" opacity="0.75" />`;
          })
          .join("");

        const svgNodes = positioned
          .map(
            (n) => `
            <g>
              <circle cx="${n.x}" cy="${n.y}" r="5" fill="${n.color}" />
              <text x="${n.x + 8}" y="${n.y + 4}" fill="#9aa4b2" font-size="11" font-family="Inter, sans-serif">${(n.name || "").replace(/</g, "&lt;")}</text>
            </g>
          `,
          )
          .join("");

        graphContainer.innerHTML = `
          <div style="position:absolute;left:12px;bottom:10px;color:#6e7d93;font-size:11px;">
            Static map mode (${reason}) • nodes: ${nodes.length}
          </div>
          <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="display:block;">
            ${svgLinks}
            ${svgNodes}
          </svg>
        `;
      }

      function render2D(data, reason = "webgl_unavailable") {
        if (typeof ForceGraph !== "function") {
          renderStaticSvg(data, `${reason}_no_force_graph`);
          return;
        }
        graphContainer.innerHTML = "";
        graphMode = "2d";
        graphInstance = ForceGraph()(graphContainer)
          .graphData(data)
          .backgroundColor("#0a0a0a")
          .nodeLabel(
            (n) =>
              `${n.name}\n${n.group || ""}\nstatus: ${n.status}\nnexus: ${n.nexusConnection}\npayment-routes: ${Array.isArray(n._paymentRoutes) ? n._paymentRoutes.length : 0}`,
          )
          .nodeCanvasObject((node, ctx, globalScale) => {
            const label = node.name || "";
            const fontSize = 10 / globalScale;
            ctx.beginPath();
            ctx.arc(node.x, node.y, 3, 0, 2 * Math.PI, false);
            ctx.fillStyle = nodeColor(node);
            ctx.fill();
            if (node._isPaymentNode) {
              ctx.strokeStyle = "#00ffcc";
              ctx.lineWidth = 1.5 / globalScale;
              ctx.stroke();
            }
            if (node.nexusConnection === "unlinked") {
              ctx.strokeStyle = "#ff4d67";
              ctx.lineWidth = 1.2 / globalScale;
              ctx.stroke();
            }
            ctx.font = `${fontSize}px Inter, sans-serif`;
            ctx.fillStyle = "#9aa4b2";
            ctx.fillText(label, node.x + 6, node.y + 3);
          })
          .linkColor((link) => linkColor(link))
          .linkWidth((link) => (link.label === "missing-nexus" ? 1.6 : 0.7))
          .cooldownTime(2500);

        setTimeout(() => {
          try {
            graphInstance.zoomToFit(400, 40);
          } catch (_e) {}
        }, 500);
      }

      function render3D(data) {
        graphMode = "3d";
        graphContainer.innerHTML = "";
        graphInstance = ForceGraph3D()(graphContainer)
          .graphData(data)
          .backgroundColor("#0a0a0a")
          .nodeLabel(
            (node) =>
              `<span style="color:${nodeColor(node)}"><b>${node.name}</b></span><br/>${node.group}<br/>status: ${node.status}<br/>nexus: ${node.nexusConnection}<br/>payment-routes: ${Array.isArray(node._paymentRoutes) ? node._paymentRoutes.length : 0}`,
          )
          .nodeColor((node) => nodeColor(node))
          .nodeVal((node) => node.val)
          .nodeRelSize(8)
          .nodeResolution(24)
          .linkDirectionalParticles((link) =>
            link.label === "missing-nexus" ? 4 : 2,
          )
          .linkDirectionalParticleSpeed(() => 0.005)
          .linkDirectionalParticleWidth((link) =>
            link.label === "missing-nexus" ? 2.6 : 1.8,
          )
          .linkWidth((link) => (link.label === "missing-nexus" ? 1.8 : 1))
          .linkColor((link) => linkColor(link))
          .onNodeClick((node) => {
            const distance = 40;
            const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
            graphInstance.cameraPosition(
              {
                x: node.x * distRatio,
                y: node.y * distRatio,
                z: node.z * distRatio,
              },
              node,
              3000,
            );
          });

        setTimeout(() => {
          try {
            graphInstance.zoomToFit(800, 60);
          } catch (e) {
            console.warn("zoomToFit failed:", e);
          }
        }, 700);
      }

      async function initGraph(data) {
        const canUse3D = supportsWebGL();
        if (!canUse3D) {
          await ensure2DLibrary();
          render2D(data, "webgl_unavailable");
          return;
        }
        try {
          await ensure3DLibrary();
          if (typeof ForceGraph3D !== "function") throw new Error("3d_runtime");
          render3D(data);
        } catch (e) {
          await ensure2DLibrary();
          render2D(data, e?.message || "3d_init");
        }
      }

      function updateGraphData(data) {
        if (!graphInstance) return;
        const prevData =
          typeof graphInstance.graphData === "function"
            ? graphInstance.graphData()
            : null;
        const nextData = preserveLayoutState(prevData, data);
        graphInstance.graphData(nextData);

        const nextSignature = topologySignature(nextData);
        const topologyChanged =
          lastTopologySignature !== null &&
          lastTopologySignature !== nextSignature;
        if (
          topologyChanged &&
          typeof graphInstance.d3ReheatSimulation === "function"
        ) {
          graphInstance.d3ReheatSimulation();
        }
        lastTopologySignature = nextSignature;
      }

      async function renderFromCurrentState() {
        if (!latestPayloadMeta || !latestFullGraphData) return;
        updateDynamicFilterOptions(latestFullGraphData.nodes);
        const filteredData = applyFiltersToGraphData(latestFullGraphData);
        renderHud(latestPayloadMeta, latestFullGraphData, filteredData);

        if (!graphInstance) {
          try {
            await initGraph(filteredData);
            lastTopologySignature = topologySignature(filteredData);
          } catch (e) {
            renderStaticSvg(filteredData, e?.message || "init_failed");
            graphMode = "static";
          }
        } else if (graphMode === "static") {
          renderStaticSvg(filteredData, "static_refresh");
        } else {
          updateGraphData(filteredData);
        }
      }

      function bindFilterEvents() {
        const syncFromInputs = () => {
          filterState.view = filterViewEl.value || "all";
          filterState.group = filterGroupEl.value || "all";
          filterState.org = filterOrgEl.value || "all";
          filterState.role = filterRoleEl.value || "all";
          filterState.status = filterStatusEl.value || "all";
          filterState.nexus = filterNexusEl.value || "all";
          filterState.routeEnv = filterRouteEnvEl.value || "all";
          filterState.routeKind = filterRouteKindEl.value || "all";
          filterState.search = (filterSearchEl.value || "").trim();
          renderFromCurrentState();
        };

        [
          filterViewEl,
          filterGroupEl,
          filterOrgEl,
          filterRoleEl,
          filterStatusEl,
          filterNexusEl,
          filterRouteEnvEl,
          filterRouteKindEl,
        ].forEach(
          (el) => el.addEventListener("change", syncFromInputs),
        );

        filterSearchEl.addEventListener("input", syncFromInputs);

        filterResetEl.addEventListener("click", () => {
          filterViewEl.value = "all";
          filterGroupEl.value = "all";
          filterOrgEl.value = "all";
          filterRoleEl.value = "all";
          filterStatusEl.value = "all";
          filterNexusEl.value = "all";
          filterRouteEnvEl.value = "all";
          filterRouteKindEl.value = "all";
          filterSearchEl.value = "";
          syncFromInputs();
        });
      }

      async function refreshGraph() {
        if (fetchInFlight) return;
        fetchInFlight = true;
        try {
          const payload = await fetchGraphPayload();
          const paymentPayload = await fetchPaymentRoutesCatalog();
          const enrichedGraphData = enrichWithPaymentData(
            payload.graphData,
            paymentPayload,
          );
          latestPayloadMeta = payload;
          latestFullGraphData = enrichedGraphData;
          await renderFromCurrentState();
        } catch (e) {
          liveSummaryEl.textContent = "Live telemetry error";
          liveMetaEl.textContent = e?.message || "graph_refresh_failed";
          liveAlertsEl.innerHTML = `<div>[ALERT] Graph refresh failure: ${e?.message || "unknown"}</div>`;
          renderFallback({ nodes: [] }, e?.message || "fetch");
        } finally {
          fetchInFlight = false;
        }
      }

      bindFilterEvents();

      (async () => {
        await refreshGraph();
        refreshTimer = setInterval(refreshGraph, LIVE_REFRESH_MS);
      })();

      window.addEventListener("beforeunload", () => {
        if (refreshTimer) clearInterval(refreshTimer);
      });
    </script>
  </body>
</html>
