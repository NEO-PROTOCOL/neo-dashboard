name: Stack Analyzer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "stack-analyzer.html"
      - ".github/workflows/stack-analyze.yml"
  workflow_dispatch:
  repository_dispatch:
    types: [ecosystem-updated]

permissions:
  contents: write
  pull-requests: write
  metadata: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard
        uses: actions/checkout@v6

      - name: Checkout neobot-orchestrator (ecosystem source of truth)
        uses: actions/checkout@v6
        with:
          repository: NEO-PROTOCOL/neobot-orchestrator
          path: neobot-source
          token: ${{ secrets.NEO_GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Stack Analyzer v3.1
        run: |
          python neobot-source/config/stack_analyzer.py \
            neobot-source/config/ecosystem.json \
            stack-report.json

      - name: Generate readiness badge
        run: |
          python scripts/generate-badge.py stack-report.json reports/readiness-badge.json

      - name: Guard analyzer template mode
        run: |
          ! grep -q "const REPORT = {" stack-analyzer.html
          grep -q 'const REPORT_URL = "./stack-report.json"' stack-analyzer.html

      - name: Open analyzer update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(analyzer): refresh stack report fallback and readiness badge [skip ci]"
          title: "chore(analyzer): refresh stack report fallback and readiness badge"
          body: |
            Automated analyzer refresh generated by the Stack Analyzer workflow.

            Updated files:
            - stack-report.json
            - reports/readiness-badge.json
          branch: automation/stack-analyzer-refresh
          delete-branch: true
          add-paths: |
            stack-report.json
            reports/readiness-badge.json
