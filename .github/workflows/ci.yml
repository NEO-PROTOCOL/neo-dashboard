name: Dashboard CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  metadata: read

jobs:
  syntax-and-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout source of truth (NEO-PROTOCOL/neobot-orchestrator)
        id: checkout-neobot
        uses: actions/checkout@v4
        with:
          repository: NEO-PROTOCOL/neobot-orchestrator
          token: ${{ secrets.NEO_GITHUB_TOKEN }}
          path: neobot-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: JavaScript Syntax Check
        run: |
          node --check server.js
          node --check src/routes/neo-routes.js
          node --check src/routes/nexus-routes.js
          node --check src/routes/nexus-routes-v2.js
          node --check src/routes/automation-routes.js
          node --check src/routes/ai-routes.js
          node --check src/routes/report-routes.js

      - name: Realtime Graph Guardrails
        run: |
          grep -q "\/api\/neo\/ecosystem\/live" public/ecosystem-3d.html
          grep -q "setInterval(refreshGraph, LIVE_REFRESH_MS)" public/ecosystem-3d.html
          grep -q "router.get(\"/ecosystem/live\"" src/routes/neo-routes.js

      - name: Analyzer Source Guardrails
        run: |
          ! grep -q "const REPORT = {" public/stack-analyzer.html
          grep -q 'const REPORT_URL = "./stack-report.json"' public/stack-analyzer.html
          grep -q "app.get('/stack-report.json'" server.js

      - name: Ecosystem Graph Integrity
        # ecosystem-graph.json is a generated artifact (in .gitignore).
        # CI generates it fresh from neobot source and validates format.
        # No git diff check — the file is never committed.
        run: |
          test -f "$GITHUB_WORKSPACE/neobot-source/config/ecosystem.json"
          ECOSYSTEM_SOURCE_PATH="$GITHUB_WORKSPACE/neobot-source/config/ecosystem.json" node scripts/sync-ecosystem-graph.mjs
          node scripts/validate-ecosystem-graph.mjs
